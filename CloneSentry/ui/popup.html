<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            width: 320px; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            background-color: #f9f9f9; 
            color: #333; 
        }
        .header { 
            background: #2c3e50; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-size: 16px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .container { padding: 15px; }
        
        /* The main status display */
        .status-box { 
            border-radius: 12px; 
            padding: 20px; 
            text-align: center; 
            color: white; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.4s ease;
        }
        #verdict { font-size: 18px; font-weight: bold; margin: 0; }
        #risk-lvl { font-size: 13px; opacity: 0.9; display: block; margin-top: 5px; }

        /* Technical Data Section */
        .details-group {
            background: white;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #eee;
            margin-bottom: 15px;
        }
        .info-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #f1f1f1;
        }
        .info-row:last-child { border-bottom: none; }
        .label { color: #7f8c8d; font-weight: 500; }
        .value { color: #2c3e50; font-weight: 600; }

        /* Action Button */
        button { 
            width: 100%; 
            padding: 12px; 
            background: #3498db; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.1s, background 0.2s;
        }
        button:hover { background: #2980b9; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #bdc3c7;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">SpecterScan Supreme</div>
    
    <div class="container">
        <div id="status-card" class="status-box" style="background: #7f8c8d;">
            <p id="verdict">Ready to Scan</p>
            <small id="risk-lvl">Click the button to begin analysis</small>
        </div>

        <div class="details-group">
            <div class="info-row">
                <span class="label">AI Confidence</span>
                <span id="ai-score" class="value">-</span>
            </div>
            <div class="info-row">
                <span class="label">Threat Engines</span>
                <span id="vt-hits" class="value">-</span>
            </div>
            <div class="info-row">
                <span class="label">Domain Age</span>
                <span id="age" class="value">-</span>
            </div>
            <div class="info-row">
                <span class="label">Security (SSL)</span>
                <span id="ssl" class="value">-</span>
            </div>
        </div>

        <button id="scanBtn">Scan Current Page</button>
        
        <div class="footer">
            Privacy Protected • Local Processing
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
